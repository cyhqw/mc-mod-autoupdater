name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag name (e.g. v0.1.0)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    name: Build and Release
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: 8.8

      - name: Cache Gradle dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            .gradle
            */build
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', 'gradle.properties', 'gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Generate Gradle wrapper
        run: gradle wrapper --gradle-version 8.8 --distribution-type bin

      - name: Build all modules
        run: ./gradlew clean build --no-daemon --stacktrace

      - name: Stage artifacts
        run: |
          mkdir -p staging
          cp fabric/build/libs/mc-mod-autoupdater-fabric-*.jar staging/
          cp forge/build/libs/mc-mod-autoupdater-forge-*.jar staging/
          cp common/build/libs/mc-mod-autoupdater-common-*.jar staging/ 2>/dev/null || true
          ls -la staging/

      - name: Determine tag name
        id: tag
        run: |
          if [ -n "${{ inputs.tag }}" ]; then
            echo "name=${{ inputs.tag }}" >> $GITHUB_OUTPUT
          else
            echo "name=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.name }}
          name: ${{ steps.tag.outputs.name }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            staging/mc-mod-autoupdater-fabric-*.jar
            staging/mc-mod-autoupdater-forge-*.jar
            staging/mc-mod-autoupdater-common-*.jar
